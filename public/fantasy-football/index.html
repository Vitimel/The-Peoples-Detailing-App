<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fantasy Football Draft Tools</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #172033;
    }
    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
    }
    main {
      width: min(640px, 100%);
      display: grid;
      gap: 16px;
      padding: 24px;
      border: 1px solid #d9dee7;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 35px rgba(23, 32, 51, 0.08);
    }
    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
    }
    p {
      margin: 0;
      color: #697386;
      line-height: 1.5;
    }
    a {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 44px;
      width: fit-content;
      padding: 0 16px;
      border-radius: 7px;
      background: #172033;
      color: #fff;
      font-weight: 750;
      text-decoration: none;
    }
    .warning {
      padding: 12px;
      border: 1px solid #f1cd8a;
      border-radius: 8px;
      background: #fff1d6;
      color: #7a4300;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Fantasy Football Draft Tools</h1>
    <p>Open the live keeper draft cockpit for draft order, team needs, at-risk targets, and strategy suggestions.</p>
    <a href="./draft-cockpit.html">Open Draft Cockpit</a>
    <div class="warning">Contains private draft strategy. Be careful sharing this link with league opponents.</div>
  </main>
</body>
</html>
